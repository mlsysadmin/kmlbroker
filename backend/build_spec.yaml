version: 0.1
component: build
timeoutInSeconds: 6000
runAs: root
shell: bash

# Exported variables
exportedVariables:
  - BUILDRUN_HASH

steps:
  - type: Command
    name: "Define unique image tag"
    timeoutInSeconds: 40
    command: |
      export BUILDRUN_HASH=$(echo ${OCI_BUILD_RUN_ID} | rev | cut -c 1-7)
      echo "BUILDRUN_HASH: " $BUILDRUN_HASH

    onFailure:
      - type: Command
        command: |
          echo "Handling Failure"
          echo "Failure successfully handled"
        timeoutInSeconds: 40
        runAs: root

  - type: Command
    timeoutInSeconds: 1200
    name: "Build container image"
    command: |
      # Navigate to frontend directory
      cd ${OCI_WORKSPACE_DIR}/backend
      docker build --pull --rm -t kmlbrokerbe:${BUILDRUN_HASH} .

outputArtifacts:
  - name: frontendImage
    type: DOCKER_IMAGE
    location: kmlbrokerbe:${BUILDRUN_HASH}

# Build Source Configuration
buildSource:
  type: Git
  location: https://github.com/mlsysadmin/kmlbroker.git
  branchName: main
  buildSpecFilePath: backend/build_spec.yaml
