version: 0.1
component: build  # <-- Add this at the root level
timeoutInSeconds: 6000

steps:
  - type: Command
    name: "Define Tagging"
    timeoutInSeconds: 60
    command: |
      export BUILDRUN_HASH=$(echo ${OCI_BUILD_RUN_ID} | rev | cut -c 1-7)
      echo "BUILDRUN_HASH: " $BUILDRUN_HASH

  - type: Command
    name: "Login to GitHub Container Registry"
    timeoutInSeconds: 60
    command: |
    run: echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "mlsysadmin" --password-stdin
    env:
      - name: GHCR_PAT
        valueFrom: "GHCR_PAT_SECRET"

  - type: Command
    name: "Build Frontend Container Image"
    timeoutInSeconds: 3600
    command: |
      cd frontend
      docker build --pull --rm -t kmlbroker:latest . || { echo "Frontend build failed"; exit 1; }
      cd ..

  - type: Command
    name: "Build Backend Container Image"
    timeoutInSeconds: 3600
    command: |
      cd backend
      docker build --pull --rm -t kmlbrokerbe:latest . || { echo "Backend build failed"; exit 1; }
      cd ..
      
outputArtifacts:
  - name: frontendImage
    type: DOCKER_IMAGE
    location: kmlbroker:latest
  - name: backendImage
    type: DOCKER_IMAGE
    location: kmlbrokerbe:latest
